<!DOCTYPE html>
<html lang="es">
  <head>
    <title>BlogDeCafé</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link href="css/normalice.css" rel="stylesheet" />
    <link
      href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wdth@0,75..100;1,75..100&family=PT+Sans:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link href="css/style.css" rel="stylesheet" />
  </head>

  <body>
    <header class="header">
      <div class="contenedor">
        <div class="barra">
          <a href="index.html" class="logo centrar-texto">
            <h1 class="logo__nombre no-margin">
              Blog<span class="logo__bold">DeCafé</span>
            </h1>
          </a>

          <nav class="navegacion">
            <a class="navegacion__enlace centrar-texto" href="nosotros.html"
              >Nosotros</a
            >
            <a class="navegacion__enlace centrar-texto" href="cursos.html"
              >Cursos</a
            >
            <a class="navegacion__enlace centrar-texto" href="contacto.html"
              >Contactos</a
            >
          </nav>
        </div>
      </div>

      <div class="header__texto">
        <h2 class="no-margin">Blog de Café con consejos y cursos</h2>
        <p class="no-margin">
          Aprende de los expertos con las mejores recetas y consejos
        </p>
      </div>
    </header>

    <main class="contenedor">
      <h3 class="centrar-texto">Contacto</h3>

      <div class="contacto-bg"></div>

      <form class="formulario">
        <div class="campo">
          <label class="campo__label" for="nombre">Nombre</label>
          <input
            class="campo__field"
            type="text"
            placeholder="Tu Nombre"
            id="nombre"
          />
        </div>

        <div class="campo">
          <label class="campo__label" for="email">Correo</label>
          <input
            class="campo__field"
            type="email"
            placeholder="Tu Email"
            id="email"
          />
        </div>

        <div class="campo">
          <label class="campo__label" for="mensaje">Mensaje</label>
          <textarea
            class="campo__field campo__field--textarea"
            id="mensaje"
          ></textarea>
        </div>

        <div class="campo">
          <input type="submit" value="enviar" class="boton boton--primario" />
        </div>
      </form>
    </main>

    <footer class="footer">
      <div class="contenedor">
        <div class="barra">
          <a href="index.html" class="logo centrar-texto">
            <h1 class="logo__nombre no-margin">
              Blog<span class="logo__bold">DeCafé</span>
            </h1>
          </a>

          <nav class="navegacion">
            <a class="navegacion__enlace centrar-texto" href="nosotros.html"
              >Nosotros</a
            >
            <a class="navegacion__enlace centrar-texto" href="cursos.html"
              >Cursos</a
            >
            <a class="navegacion__enlace centrar-texto" href="contacto.html"
              >Contactos</a
            >
          </nav>
        </div>
      </div>
    </footer>
  </body>
</html>
